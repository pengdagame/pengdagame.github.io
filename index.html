---

<ul class="list pa0">
  {% for post in site.posts %}
  <li class="mv2">
    <a href="{{ site.url }}{{ post.url }}" class="db pv1 link blue hover-mid-gray">
      {{ post.title }}
      <time class="fr silver ttu">{{ post.date | date_to_string }} </time>
    </a>
    <footer class="mw7 center tc pt3 pb4 silver">
      Mastering Markdown <a href="https://guides.github.com/features/mastering-markdown/" 
                            class="link silver hover-blue pv1">Scribble</a>
      <img src="{{ site.url }}/images/scribble2.png" alt="scribble" class="mt4 db center" />
    </footer>
  </li>
  {% endfor %}
</ul>
